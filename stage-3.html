<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>CRITICAL OVERRIDE</title>
    <style>
        body { background-color: #050000; color: #ff3333; font-family: 'Courier New', monospace; height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; }
        #init-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:#050000; color:#ff3333; display:flex; align-items:center; justify-content:center; z-index:9999; cursor:pointer; letter-spacing:4px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .status-light { position: absolute; top: 30px; right: 40px; width: 15px; height: 15px; border-radius: 50%; background:#f00; box-shadow: 0 0 15px #f00; opacity: 0; animation: morse-four 6s infinite; animation-play-state: paused; }
        @keyframes morse-four { 0%,5%,11%,16%,22%,27%,33%,38% {opacity:1} 6%,10%,17%,21%,28%,32%,39%,43% {opacity:0} 44%,60% {opacity:1} 61%,100% {opacity:0} }
        .container { text-align: center; border: 1px solid #ff3333; padding: 50px; }
        .error-code { font-size: 32px; letter-spacing: 10px; margin: 40px 0; color: #fff; text-shadow: 0 0 10px #ff3333; }
        input { background: rgba(255,0,0,0.1); border: 1px solid #ff3333; color: #fff; font-size: 18px; text-align: center; padding: 15px; outline: none; width: 80%; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="init-overlay">> CLICK TO INITIALIZE PURGE PROTOCOL <</div>
    <audio id="alarm-audio" src="alarm.mp3" loop style="display: none;"></audio>
    <div class="status-light" id="morse-light"></div>
    <div class="container">
        <h1>SYSTEM LOCKDOWN</h1>
        <div class="error-code">DYKDAERK</div>
        <input type="text" id="stage3-passcode" placeholder="OVERRIDE" autocomplete="off">
    </div>
    <script>
        document.getElementById('init-overlay').addEventListener('click', function() {
            document.getElementById('alarm-audio').play();
            document.getElementById('morse-light').style.animationPlayState = 'running';
            this.style.display = 'none';
            document.getElementById('stage3-passcode').focus();
        });
        document.getElementById('stage3-passcode').addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && this.value.toUpperCase().trim() === 'ZUGZWANG') { window.location.href = 'limbo.html'; }
        });
    </script>
</body>
</html>
