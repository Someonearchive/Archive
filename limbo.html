<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>STATUS: LIMBO</title>
    <style>
        body { background-color: #030303; color: #dcdcdc; font-family: 'Courier New', monospace; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 100%); }
        .timer-container { font-size: 6vw; font-weight: bold; letter-spacing: 10px; color: #ff3333; margin-bottom: 60px; }
        .glitch-active { animation: text-glitch 0.2s infinite; }
        @keyframes text-glitch { 20% { transform: translate(-3px, 2px); color: #fff; } 40% { transform: translate(-1px, -1px); color: #ff3333; } 60% { transform: translate(3px, 1px); color: #0f0; } }
        .final-directive { display: flex; flex-direction: column; align-items: center; opacity: 0; transition: opacity 2s ease; text-align: center; }
        .clearance-code { font-size: 24px; letter-spacing: 8px; color: #fff; background: rgba(255,255,255,0.05); padding: 15px 30px; border: 1px solid #333; }
    </style>
</head>
<body>
    <div style="font-size:14px; letter-spacing:4px; color:#0f0; margin-bottom:50px;">> INITIATING PHASE TWO STANDBY.</div>
    <div class="timer-container glitch-active" id="countdown">99:99:99:99</div>
    <div class="final-directive" id="directive-block">
        <div style="margin-bottom:25px; letter-spacing:3px;">RETAIN THIS KEY FOR THE NEXT GATE.</div>
        <div class="clearance-code">ECLIPSE-01</div>
        <div style="margin-top:20px; font-size:10px; color:#ff3333; letter-spacing:5px;">THERE WILL BE NO REMINDERS.</div>
    </div>
    <script>
        const timerElement = document.getElementById('countdown');
        const targetDate = new Date(); targetDate.setDate(targetDate.getDate() + 30);
        function updateTimer() {
            const now = new Date(); const diff = targetDate - now;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const min = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const sec = Math.floor((diff % (1000 * 60)) / 1000);
            const pad = (n) => n.toString().padStart(2, '0');
            timerElement.innerText = `${pad(days)}:${pad(hours)}:${pad(min)}:${pad(sec)}`;
        }
        setTimeout(() => {
            timerElement.classList.remove('glitch-active'); timerElement.style.color = '#fff';
            updateTimer(); setInterval(updateTimer, 1000);
            document.getElementById('directive-block').style.opacity = '1';
        }, 3500);
    </script>
</body>
</html>
