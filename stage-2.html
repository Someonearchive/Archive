<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRITICAL OVERRIDE</title>
    <style>
        body {
            background-color: #050000;
            color: #ff3333;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- THE NEW OVERLAY --- */
        #init-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #050000;
            color: #ff3333;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            cursor: pointer;
            font-size: 18px;
            letter-spacing: 4px;
            text-align: center;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* The Blinking Morse Code Light */
        .status-light {
            position: absolute;
            top: 30px;
            right: 40px;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background-color: #ff0000;
            box-shadow: 0 0 15px #ff0000;
            opacity: 0;
            /* Animation starts paused until they click */
            animation: morse-four 6s infinite; 
            animation-play-state: paused; 
        }

        @keyframes morse-four {
            0%, 5% { opacity: 1; } 6%, 10% { opacity: 0; }
            11%, 16% { opacity: 1; } 17%, 21% { opacity: 0; }
            22%, 27% { opacity: 1; } 28%, 32% { opacity: 0; }
            33%, 38% { opacity: 1; } 39%, 43% { opacity: 0; }
            44%, 60% { opacity: 1; } 61%, 100% { opacity: 0; }
        }

        .container {
            text-align: center;
            max-width: 600px;
            border: 1px solid #ff3333;
            padding: 50px;
            background-color: rgba(255, 0, 0, 0.05);
        }

        h1 {
            font-size: 24px;
            letter-spacing: 5px;
            margin-bottom: 20px;
            animation: glitch 2s infinite;
        }

        .error-code {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 10px;
            margin: 40px 0;
            color: #fff;
            text-shadow: 0 0 10px #ff3333;
        }

        .input-group label {
            font-size: 12px;
            letter-spacing: 3px;
            display: block;
            margin-bottom: 15px;
        }

        input {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid #ff3333;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            text-align: center;
            padding: 15px;
            outline: none;
            width: 80%;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        input:focus {
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            background: rgba(255, 0, 0, 0.2);
        }

        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 1px) }
            40% { transform: translate(-1px, -1px) }
            60% { transform: translate(2px, 1px) }
            80% { transform: translate(1px, -1px) }
            100% { transform: translate(0) }
        }
    </style>
</head>
<body>

    <div id="init-overlay">
        > CLICK TO INITIALIZE PURGE PROTOCOL <
    </div>

    <audio id="alarm-audio" src="alarm.mp3" loop style="display: none;"></audio>

    <div class="status-light" id="morse-light"></div>

    <div class="container">
        <h1>SYSTEM LOCKDOWN</h1>
        <p>> UNAUTHORIZED ACCESS DETECTED.<br>> INITIATING PURGE PROTOCOL.</p>
        
        <div class="error-code">DYKDAERK</div>

        <div class="input-group">
            <label>ENTER MANUAL OVERRIDE</label>
            <input type="text" id="stage3-passcode" placeholder="AWAITING INPUT" autocomplete="off">
        </div>
    </div>

    <script>
        // --- OVERLAY LOGIC TO BYPASS AUTOPLAY BLOCK ---
        document.getElementById('init-overlay').addEventListener('click', function() {
            // Play the alarm
            document.getElementById('alarm-audio').play();
            // Start the morse code animation
            document.getElementById('morse-light').style.animationPlayState = 'running';
            // Hide the overlay
            this.style.display = 'none';
            // Focus the input box automatically
            document.getElementById('stage3-passcode').focus();
        });

        // --- PASSWORD LOGIC ---
        document.getElementById('stage3-passcode').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                const attempt = this.value.toUpperCase().trim();
                
                if (attempt === 'ZUGZWANG') {
                    window.location.href = '/limbo.html'; 
                } else {
                    this.style.backgroundColor = '#ff0000';
                    this.style.color = '#000';
                    setTimeout(() => { 
                        this.style.backgroundColor = 'rgba(255, 0, 0, 0.1)'; 
                        this.style.color = '#fff';
                        this.value = ''; 
                    }, 400);
                }
            }
        });
    </script>
</body>
</html>
